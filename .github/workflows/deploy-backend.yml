name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: testarauco
  DOTNET_VERSION: '9.0.x'
  WORKING_DIRECTORY: ./backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 📦 Restore dependencies
      run: dotnet restore Backend.csproj
      working-directory: ${{ env.WORKING_DIRECTORY }}

    - name: 🔨 Build
      run: dotnet build Backend.csproj --configuration Release --no-restore
      working-directory: ${{ env.WORKING_DIRECTORY }}

    - name: 🧪 Test
      run: dotnet test Backend.csproj --no-restore --verbosity normal
      working-directory: ${{ env.WORKING_DIRECTORY }}
      continue-on-error: true

    - name: 📤 Publish
      run: dotnet publish Backend.csproj --configuration Release --output ./publish --self-contained true --runtime linux-x64 /p:PublishReadyToRun=true
      working-directory: ${{ env.WORKING_DIRECTORY }}

    - name: 🚀 Deploy to Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ${{ env.WORKING_DIRECTORY }}/publish

    - name: ✅ Deployment Summary
      run: |
        echo "🎉 Backend deployed successfully!"
        echo "🌐 URL: https://testarauco-htfzbfacbcf3fcfs.eastus2-01.azurewebsites.net"
        echo "📚 API: https://testarauco-htfzbfacbcf3fcfs.eastus2-01.azurewebsites.net/api"
        echo "📚 Swagger: https://testarauco-htfzbfacbcf3fcfs.eastus2-01.azurewebsites.net/swagger"
